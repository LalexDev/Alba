<div
  class="layout"
  [class.sidebar-open]="sidebarOpen"
>
  <!-- MENÚ LATERAL -->
  <aside
    class="sidebar"
    [class.open]="sidebarOpen"
  >
    <div class="brand">
      <div class="brand-icon">👓</div>

      <div class="brand-text">
        <h2>Óptica alba</h2>
        <span>Sistema para ópticas</span>
      </div>

      <button
        class="sidebar-close"
        type="button"
        aria-label="Cerrar menú"
        (click)="closeSidebar()"
      >
        ×
      </button>
    </div>

    <div class="user-card">
      <strong>{{ userLabel }}</strong>
      <span>{{ role }}</span>
    </div>

    <nav class="nav">
      <a
        *ngFor="let item of visibleItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <span class="emoji">
          {{ item.icon }}
        </span>

        <span class="nav-label">
          {{ item.label }}
        </span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button
        class="btn secondary full"
        type="button"
        (click)="logout()"
      >
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- FONDO OSCURO EN CELULAR -->
  <button
    class="sidebar-backdrop"
    type="button"
    aria-label="Cerrar menú"
    [class.visible]="sidebarOpen"
    (click)="closeSidebar()"
  ></button>

  <!-- CONTENIDO PRINCIPAL -->
  <section class="content">

    <!-- BARRA DE LAS PÁGINAS INTERNAS -->
    <div
      class="topbar no-print"
      *ngIf="mostrarTopbar"
    >
      <div class="topbar-information">
        <button
          class="mobile-menu"
          type="button"
          aria-label="Abrir menú"
          (click)="toggleSidebar()"
        >
          ☰
        </button>

        <div class="topbar-title">
          <h1>
            {{ pageTitle.icon }}
            {{ pageTitle.label }}
          </h1>

          <div class="muted">
            Control de ventas, inventario, clientes y códigos de barras.
          </div>
        </div>
      </div>

      <div class="topbar-actions">
        <button
          class="btn ghost"
          type="button"
          (click)="quickScanner()"
        >
          Escanear rápido
        </button>
      </div>
    </div>

    <!-- BOTÓN MÓVIL PARA EL DASHBOARD -->
    <button
      class="mobile-menu dashboard-menu-button no-print"
      type="button"
      *ngIf="!mostrarTopbar"
      aria-label="Abrir menú"
      (click)="toggleSidebar()"
    >
      ☰
    </button>

    <div class="route-content">
      <router-outlet></router-outlet>
    </div>
  </section>
</div>
