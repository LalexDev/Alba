spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/optistock_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  sql:
    init:
      mode: always

app:
  jwt:
    secret: ${JWT_SECRET:012345678901234567890123456789012345678901234567890123456789}
    expiration-millis: 86400000

server:
  port: ${PORT:8080}
